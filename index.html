<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>TRON · Light Cycle Battle</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000d1f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TRON">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      background: #000;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-grid {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0.18;
    }

    .splash-grid canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .splash-logo {
      font-family: 'Courier New', monospace;
      font-size: clamp(52px, 14vw, 96px);
      font-weight: bold;
      letter-spacing: 18px;
      color: #ffe050;
      text-shadow: 0 0 30px #ffe050, 0 0 80px rgba(255, 220, 0, 0.4), 0 0 120px rgba(255, 200, 0, 0.2);
      animation: logoGlow 2s ease-in-out infinite alternate;
      position: relative;
    }

    @keyframes logoGlow {
      from {
        text-shadow: 0 0 20px #ffe050, 0 0 60px rgba(255, 220, 0, 0.3);
      }

      to {
        text-shadow: 0 0 40px #ffe050, 0 0 100px rgba(255, 220, 0, 0.6), 0 0 160px rgba(255, 200, 0, 0.3);
      }
    }

    .splash-sub {
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 2.5vw, 13px);
      letter-spacing: 6px;
      color: rgba(0, 200, 255, 0.7);
      position: relative;
    }

    .splash-bar-wrap {
      width: clamp(180px, 40vw, 300px);
      height: 3px;
      background: rgba(0, 180, 255, 0.15);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .splash-bar {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #ffe050);
      box-shadow: 0 0 10px #00d4ff;
      animation: loadBar 1.8s ease-out forwards;
      width: 0%;
    }

    @keyframes loadBar {
      to {
        width: 100%;
      }
    }

    .splash-status {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(0, 180, 255, 0.45);
      position: relative;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 14px;
      background: rgba(0, 0, 20, 0.85);
      border-bottom: 1px solid rgba(0, 180, 255, 0.2);
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .hud-label {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0, 180, 255, 0.55);
    }

    .hud-val {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #h1v {
      color: #ffe050;
      text-shadow: 0 0 8px #ffe050;
    }

    #h2v {
      color: #00d4ff;
      text-shadow: 0 0 8px #00d4ff;
    }

    #hisv {
      color: rgba(0, 180, 255, 0.7);
    }

    /* ── DPADS ── */
    .dpad {
      position: fixed;
      display: grid;
      grid-template-columns: 42px 42px 42px;
      grid-template-rows: 42px 42px 42px;
      gap: 3px;
      z-index: 20;
    }

    #dpad1 {
      bottom: 18px;
      left: 10px;
    }

    #dpad2 {
      bottom: 18px;
      right: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.6);
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active,
    .btn.pressed {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn.empty {
      background: transparent !important;
      border: none !important;
      pointer-events: none;
    }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 15, 0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .ov-border {
      border: 1px solid rgba(0, 200, 255, 0.3);
      padding: 32px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
    }

    .ov-border::before,
    .ov-border::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: rgba(0, 220, 255, 0.7);
      border-style: solid;
    }

    .ov-border::before {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
    }

    .ov-border::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 2px 2px 0;
    }

    #ov-title {
      font-family: 'Courier New', monospace;
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 12px;
      color: #ffe050;
      text-shadow: 0 0 24px #ffe050, 0 0 48px rgba(255, 220, 0, 0.3);
    }

    #ov-sub {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 5px;
      color: rgba(0, 200, 255, 0.6);
    }

    #ov-winner {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 5px;
      margin: 4px 0;
    }

    #ov-btn {
      background: transparent;
      border: 1px solid rgba(0, 200, 255, 0.5);
      color: rgba(0, 200, 255, 0.9);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 5px;
      padding: 10px 28px;
      cursor: pointer;
      margin-top: 4px;
      transition: all .2s;
      text-transform: uppercase;
    }

    #ov-btn:hover {
      background: rgba(0, 200, 255, 0.12);
      border-color: #00d4ff;
      color: #00d4ff;
    }

    /* ── INSTALL BANNER ── */
    #install-banner {
      position: fixed;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      display: none;
      background: rgba(0, 10, 30, 0.95);
      border: 1px solid rgba(0, 200, 255, 0.4);
      padding: 10px 20px;
      gap: 12px;
      align-items: center;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
    }

    #install-banner span {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 200, 255, 0.8);
    }

    #install-banner button {
      background: rgba(0, 200, 255, 0.15);
      border: 1px solid rgba(0, 200, 255, 0.5);
      color: #00d4ff;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    #install-banner button:hover {
      background: rgba(0, 200, 255, 0.3);
    }

    #dismiss-btn {
      background: transparent !important;
      border: none !important;
      color: rgba(255, 255, 255, 0.3) !important;
      font-size: 14px !important;
      padding: 0 4px !important;
    }
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-grid"><canvas id="sgc"></canvas></div>
    <div class="splash-logo">TRON</div>
    <div class="splash-sub">LIGHT CYCLE BATTLE</div>
    <div class="splash-bar-wrap">
      <div class="splash-bar"></div>
    </div>
    <div class="splash-status" id="splash-status">INITIALIZING GRID...</div>
  </div>

  <!-- GAME -->
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">1ST</span>
      <span class="hud-val" id="h1v">0000</span>
    </div>
    <div class="hud-block" style="flex-direction:row;gap:20px;align-items:center;">
      <span class="hud-val" id="ind1">▬ 5</span>
      <div class="hud-block"><span class="hud-label">HISCORE</span><span class="hud-val" id="hisv">0000</span></div>
      <span class="hud-val" id="ind2">5 ▬</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">2ND</span>
      <span class="hud-val" id="h2v">0000</span>
    </div>
  </div>

  <div class="dpad" id="dpad1">
    <div class="btn empty"></div>
    <div class="btn" id="p1up">▲</div>
    <div class="btn empty"></div>
    <div class="btn" id="p1left">◀</div>
    <div class="btn empty"></div>
    <div class="btn" id="p1right">▶</div>
    <div class="btn empty"></div>
    <div class="btn" id="p1down">▼</div>
    <div class="btn empty"></div>
  </div>
  <div class="dpad" id="dpad2">
    <div class="btn empty"></div>
    <div class="btn" id="p2up">▲</div>
    <div class="btn empty"></div>
    <div class="btn" id="p2left">◀</div>
    <div class="btn empty"></div>
    <div class="btn" id="p2right">▶</div>
    <div class="btn empty"></div>
    <div class="btn" id="p2down">▼</div>
    <div class="btn empty"></div>
  </div>

  <div id="install-banner">
    <span>📲 INSTALAR EN TU DISPOSITIVO</span>
    <button id="install-btn">INSTALAR</button>
    <button id="dismiss-btn">✕</button>
  </div>

  <div id="overlay">
    <div class="ov-border">
      <div id="ov-title">TRON</div>
      <div id="ov-sub">LIGHT CYCLE BATTLE · 2 PLAYERS</div>
      <div id="ov-winner" style="display:none;"></div>
      <button id="ov-btn" onclick="startGame()">INSERT COIN</button>
    </div>
  </div>

  <script>
    // ── SERVICE WORKER ─────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }

    // ── INSTALL PROMPT ─────────────────────────────────────────────────────────
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      const banner = document.getElementById('install-banner');
      banner.style.display = 'flex';
    });
    document.getElementById('install-btn').addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    });
    document.getElementById('dismiss-btn').addEventListener('click', () => {
      document.getElementById('install-banner').style.display = 'none';
    });

    // ── SPLASH SCREEN ──────────────────────────────────────────────────────────
    (function () {
      const sgc = document.getElementById('sgc');
      const sc = sgc.getContext('2d');
      sgc.width = window.innerWidth;
      sgc.height = window.innerHeight;
      const W = sgc.width, H = sgc.height;
      sc.strokeStyle = 'rgba(0,180,255,1)';
      sc.lineWidth = 0.8;
      const step = 32;
      for (let x = 0; x <= W; x += step) { sc.beginPath(); sc.moveTo(x, 0); sc.lineTo(x, H); sc.stroke(); }
      for (let y = 0; y <= H; y += step) { sc.beginPath(); sc.moveTo(0, y); sc.lineTo(W, y); sc.stroke(); }
    })();

    const msgs = ['INITIALIZING GRID...', 'LOADING LIGHT CYCLES...', 'CALIBRATING ARENA...', 'SYSTEM READY'];
    let mi = 0;
    const statusEl = document.getElementById('splash-status');
    const msgTimer = setInterval(() => {
      mi++;
      if (mi < msgs.length) statusEl.textContent = msgs[mi];
      else clearInterval(msgTimer);
    }, 450);

    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('hide');
      setTimeout(() => { splash.style.display = 'none'; }, 650);
    }, 1900);

    // ── SOUND FX ───────────────────────────────────────────────────────────────
    let sfxCtx = null;
    function getSfx() {
      if (!sfxCtx) sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
      return sfxCtx;
    }
    function sfxEngine(idx) {
      const a = getSfx(), now = a.currentTime;
      const osc = a.createOscillator(), g = a.createGain();
      osc.type = 'square'; osc.frequency.value = idx === 0 ? 440 : 290;
      g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);
      osc.connect(g); g.connect(a.destination); osc.start(now); osc.stop(now + 0.05);
    }
    function sfxTurn() {
      const a = getSfx(), now = a.currentTime;
      const osc = a.createOscillator(), g = a.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(700, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.09);
      g.gain.setValueAtTime(0.13, now); g.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
      osc.connect(g); g.connect(a.destination); osc.start(now); osc.stop(now + 0.11);
    }
    function sfxCrash() {
      const a = getSfx(), now = a.currentTime;
      const buf = a.createBuffer(1, a.sampleRate * 0.55, a.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = a.createBufferSource(); src.buffer = buf;
      const flt = a.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 900;
      const g1 = a.createGain(); g1.gain.setValueAtTime(0.9, now); g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
      src.connect(flt); flt.connect(g1); g1.connect(a.destination); src.start(now); src.stop(now + 0.55);
      const osc = a.createOscillator(), g2 = a.createGain();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(280, now); osc.frequency.exponentialRampToValueAtTime(35, now + 0.45);
      g2.gain.setValueAtTime(0.4, now); g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
      osc.connect(g2); g2.connect(a.destination); osc.start(now); osc.stop(now + 0.5);
    }
    function sfxPowerUp(type) {
      const a = getSfx(), now = a.currentTime;
      const freqs = type === 'speed' ? [400, 600, 900, 1200] : [300, 450, 600];
      freqs.forEach((f, i) => {
        const osc = a.createOscillator(), g = a.createGain();
        osc.type = 'sine'; osc.frequency.value = f; const t = now + i * 0.07;
        g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
        osc.connect(g); g.connect(a.destination); osc.start(t); osc.stop(t + 0.16);
      });
    }
    function sfxWin() {
      const a = getSfx(), now = a.currentTime;
      [523, 659, 784, 1047].forEach((f, i) => {
        const osc = a.createOscillator(), g = a.createGain();
        osc.type = 'square'; osc.frequency.value = f; const t = now + i * 0.14;
        g.gain.setValueAtTime(0.17, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
        osc.connect(g); g.connect(a.destination); osc.start(t); osc.stop(t + 0.27);
      });
    }

    // ── GAME ENGINE ────────────────────────────────────────────────────────────
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let W, H, COLS, ROWS, CELL, OFFSET_Y;
    const DPAD_H = 148, HEADER = 32;

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W; canvas.height = H;
      const avail = H - DPAD_H - HEADER;
      CELL = Math.floor(Math.min(W, avail) / 38);
      COLS = Math.floor(W / CELL); ROWS = Math.floor(avail / CELL);
      OFFSET_Y = HEADER + Math.floor((avail - ROWS * CELL) / 2);
    }
    resize();
    window.addEventListener('resize', () => { resize(); if (!running) drawBg(); });

    let running = false, gameLoop = null, grid = [], players = [], powerUps = [], frameCount = 0, hiscore = 0;
    let engineTick = [0, 0];
    const PC = [{ main: '#ffe050', glow: '#ffcc00' }, { main: '#00d4ff', glow: '#00aaff' }];

    function initGrid() { grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(0)); }
    function createPlayers() {
      const mg = Math.floor(COLS / 5);
      players = [
        { x: mg, y: Math.floor(ROWS / 2), dx: 1, dy: 0, trail: [], trailLength: 5, speedBoost: 0, alive: true, wins: 0, score: 0 },
        { x: COLS - mg - 1, y: Math.floor(ROWS / 2), dx: -1, dy: 0, trail: [], trailLength: 5, speedBoost: 0, alive: true, wins: 0, score: 0 }
      ];
    }
    function spawnPowerUp() {
      const types = ['trail', 'trail', 'speed'];
      const type = types[Math.floor(Math.random() * types.length)];
      let px, py, att = 0;
      do { px = 3 + Math.floor(Math.random() * (COLS - 6)); py = 3 + Math.floor(Math.random() * (ROWS - 6)); att++; }
      while (grid[py][px] !== 0 && att < 40);
      if (att < 40) powerUps.push({ x: px, y: py, type, born: frameCount });
    }
    function drawBg() {
      ctx.fillStyle = '#000d1f'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#000e22'; ctx.fillRect(0, OFFSET_Y, W, ROWS * CELL);
      ctx.strokeStyle = 'rgba(0,80,160,0.28)'; ctx.lineWidth = 0.7;
      for (let r = 0; r <= ROWS; r++) { const y = OFFSET_Y + r * CELL; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      for (let c = 0; c <= COLS; c++) { const x = c * CELL; ctx.beginPath(); ctx.moveTo(x, OFFSET_Y); ctx.lineTo(x, OFFSET_Y + ROWS * CELL); ctx.stroke(); }
      ctx.strokeStyle = 'rgba(0,160,220,0.35)'; ctx.lineWidth = 1.5;
      ctx.strokeRect(0, OFFSET_Y, COLS * CELL, ROWS * CELL);
    }
    function drawTrailPath(p) {
      if (p.trail.length < 2) return;
      const half = CELL / 2;
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x * CELL + half, OFFSET_Y + p.trail[0].y * CELL + half);
      for (let i = 1; i < p.trail.length; i++)ctx.lineTo(p.trail[i].x * CELL + half, OFFSET_Y + p.trail[i].y * CELL + half);
      ctx.lineTo(p.x * CELL + half, OFFSET_Y + p.y * CELL + half); ctx.stroke();
    }
    function drawTrails() {
      players.forEach((p, idx) => {
        if (p.trail.length < 2) return;
        const pc = PC[idx];
        ctx.lineCap = 'square';
        ctx.strokeStyle = pc.glow; ctx.lineWidth = CELL * 0.55; ctx.globalAlpha = 0.12; drawTrailPath(p);
        ctx.lineWidth = CELL * 0.35; ctx.globalAlpha = 0.22; drawTrailPath(p);
        ctx.strokeStyle = pc.main; ctx.lineWidth = Math.max(1.5, CELL * 0.18); ctx.globalAlpha = 1; drawTrailPath(p);
        ctx.globalAlpha = 1;
      });
    }
    function drawBike(p, idx) {
      if (!p.alive) return;
      const pc = PC[idx];
      const cx = p.x * CELL + CELL / 2, cy = OFFSET_Y + p.y * CELL + CELL / 2;
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(Math.atan2(p.dy, p.dx) + Math.PI / 2);
      const s = CELL, bw = s * 0.28, bh = s * 0.52;
      ctx.shadowColor = pc.glow; ctx.shadowBlur = 12;
      ctx.strokeStyle = pc.main; ctx.fillStyle = pc.main; ctx.lineWidth = 1;
      ctx.strokeRect(-bw / 2, -bh / 2, bw, bh);
      ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fillRect(-bw * 0.3, -bh * 0.22, bw * 0.6, bh * 0.28);
      ctx.fillStyle = pc.main;
      ctx.fillRect(-bw / 2 - 1, -bh / 2, 3, bh * 0.35); ctx.fillRect(bw / 2 - 2, -bh / 2, 3, bh * 0.35);
      ctx.fillRect(-bw / 2 - 1, bh * 0.2, 3, bh * 0.3); ctx.fillRect(bw / 2 - 2, bh * 0.2, 3, bh * 0.3);
      if (p.speedBoost > 0) { ctx.fillStyle = 'rgba(255,255,180,0.9)'; ctx.fillRect(-1, bh / 2 - 2, 2, s * 0.2); }
      ctx.shadowBlur = 0; ctx.restore();
    }
    function drawPowerUps() {
      const t = frameCount / 30;
      powerUps.forEach(pu => {
        const cx = pu.x * CELL + CELL / 2, cy = OFFSET_Y + pu.y * CELL + CELL / 2;
        const pulse = 0.65 + 0.35 * Math.sin(t * 2 + pu.x), r = CELL * 0.32 * pulse;
        if (pu.type === 'trail') {
          ctx.shadowColor = '#cc00ff'; ctx.shadowBlur = 10;
          ctx.strokeStyle = `rgba(200,0,255,${0.8 * pulse})`; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = `rgba(220,100,255,${0.9 * pulse})`;
          ctx.font = `bold ${Math.floor(CELL * 0.5)}px 'Courier New'`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('+', cx, cy);
        } else {
          ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10;
          ctx.strokeStyle = `rgba(0,255,130,${0.8 * pulse})`; ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r, cy); ctx.lineTo(cx, cy + r); ctx.lineTo(cx - r, cy);
          ctx.closePath(); ctx.stroke();
          ctx.fillStyle = `rgba(0,255,130,${0.6 * pulse})`; ctx.fill();
        }
        ctx.shadowBlur = 0;
      });
    }
    function updateHUD() {
      hiscore = Math.max(hiscore, players[0].score, players[1].score);
      document.getElementById('h1v').textContent = String(players[0].score).padStart(4, '0');
      document.getElementById('h2v').textContent = String(players[1].score).padStart(4, '0');
      document.getElementById('hisv').textContent = String(hiscore).padStart(4, '0');
      document.getElementById('ind1').textContent = `▬ ${players[0].trailLength}${players[0].speedBoost > 0 ? ' ⚡' : ''}`;
      document.getElementById('ind2').textContent = `${players[1].trailLength} ▬${players[1].speedBoost > 0 ? ' ⚡' : ''}`;
    }
    function updatePlayer(p, idx) {
      if (!p.alive) return;
      const spd = p.speedBoost > 0 ? 3 : 6;
      if (frameCount % spd !== 0) return;
      if (p.speedBoost > 0) p.speedBoost--;
      const nx = p.x + p.dx, ny = p.y + p.dy;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { p.alive = false; sfxCrash(); return; }
      if (grid[ny][nx] !== 0) { p.alive = false; sfxCrash(); return; }
      grid[p.y][p.x] = idx + 1;
      p.trail.push({ x: p.x, y: p.y });
      while (p.trail.length > p.trailLength) {
        const old = p.trail.shift();
        if (grid[old.y][old.x] === idx + 1) grid[old.y][old.x] = 0;
      }
      p.x = nx; p.y = ny; p.score += 1;
      engineTick[idx]++;
      if (engineTick[idx] % 2 === 0) sfxEngine(idx);
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        if (pu.x === p.x && pu.y === p.y) {
          if (pu.type === 'trail') { p.trailLength = Math.min(p.trailLength + 5, 80); p.score += 50; }
          else { p.speedBoost = 100; p.score += 30; }
          sfxPowerUp(pu.type); powerUps.splice(i, 1);
        }
      }
    }
    function gameStep() {
      frameCount++;
      updatePlayer(players[0], 0); updatePlayer(players[1], 1);
      if (frameCount % 85 === 0 && powerUps.length < 5) spawnPowerUp();
      drawBg(); drawTrails(); drawPowerUps();
      drawBike(players[0], 0); drawBike(players[1], 1);
      updateHUD();
      const a1 = players[0].alive, a2 = players[1].alive;
      if (!a1 || !a2) { running = false; cancelAnimationFrame(gameLoop); setTimeout(() => showResult(a1, a2), 400); return; }
      gameLoop = requestAnimationFrame(gameStep);
    }
    function showResult(a1, a2) {
      const ov = document.getElementById('overlay'), wt = document.getElementById('ov-winner'), btn = document.getElementById('ov-btn');
      if (!a1 && !a2) { wt.textContent = '— DRAW —'; wt.style.color = '#fff'; wt.style.textShadow = '0 0 10px #fff'; }
      else if (a1) { players[0].wins++; wt.textContent = 'PLAYER 1 WINS'; wt.style.color = '#ffe050'; wt.style.textShadow = '0 0 16px #ffe050'; sfxWin(); }
      else { players[1].wins++; wt.textContent = 'PLAYER 2 WINS'; wt.style.color = '#00d4ff'; wt.style.textShadow = '0 0 16px #00d4ff'; sfxWin(); }
      wt.style.display = 'block'; btn.textContent = 'PLAY AGAIN'; ov.style.display = 'flex';
    }
    function applyDir(p, dx, dy) {
      if (dx !== 0 && p.dx !== 0) return;
      if (dy !== 0 && p.dy !== 0) return;
      p.dx = dx; p.dy = dy; sfxTurn();
    }
    function startGame() {
      getSfx();
      document.getElementById('overlay').style.display = 'none';
      const w0 = players[0]?.wins || 0, w1 = players[1]?.wins || 0;
      const s0 = players[0]?.score || 0, s1 = players[1]?.score || 0;
      resize(); initGrid(); powerUps = []; frameCount = 0; engineTick = [0, 0];
      createPlayers();
      players[0].wins = w0; players[1].wins = w1;
      players[0].score = s0; players[1].score = s1;
      running = true;
      if (gameLoop) cancelAnimationFrame(gameLoop);
      gameLoop = requestAnimationFrame(gameStep);
    }
    document.addEventListener('keydown', e => {
      if (!running) return;
      const p1 = players[0], p2 = players[1];
      if (e.key === 'ArrowUp') applyDir(p1, 0, -1);
      if (e.key === 'ArrowDown') applyDir(p1, 0, 1);
      if (e.key === 'ArrowLeft') applyDir(p1, -1, 0);
      if (e.key === 'ArrowRight') applyDir(p1, 1, 0);
      if (e.key === 'w') applyDir(p2, 0, -1);
      if (e.key === 's') applyDir(p2, 0, 1);
      if (e.key === 'a') applyDir(p2, -1, 0);
      if (e.key === 'd') applyDir(p2, 1, 0);
    });
    ['up', 'down', 'left', 'right'].forEach(dir => {
      const map = { up: { dx: 0, dy: -1 }, down: { dx: 0, dy: 1 }, left: { dx: -1, dy: 0 }, right: { dx: 1, dy: 0 } };
      [1, 2].forEach(pi => {
        const el = document.getElementById(`p${pi}${dir}`);
        if (!el) return;
        const act = () => {
          if (!running) return;
          applyDir(players[pi - 1], map[dir].dx, map[dir].dy);
          el.classList.add('pressed'); setTimeout(() => el.classList.remove('pressed'), 100);
        };
        el.addEventListener('touchstart', e => { e.preventDefault(); act(); }, { passive: false });
        el.addEventListener('mousedown', act);
      });
    });

    drawBg();
  </script>
</body>
